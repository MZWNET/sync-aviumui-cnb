name: Sync AviumUI framework/base repo to CNB
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync AviumUI framework/base repo to CNB
        run: |
          git lfs install
          git config --global lfs.locksverify true
          git init

          git remote add source https://github.com/AviumUI/android_frameworks_base
          git fetch --depth 1 source refs/tags/avium-16.2-beta
          git checkout FETCH_HEAD

          TREE=$(git rev-parse HEAD^{tree})
          AUTHOR_NAME=$(git log -1 --pretty=format:'%an' HEAD)
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae' HEAD)
          AUTHOR_DATE=$(git log -1 --pretty=format:'%aI' HEAD)
          COMMITTER_NAME=$(git log -1 --pretty=format:'%cn' HEAD)
          COMMITTER_EMAIL=$(git log -1 --pretty=format:'%ce' HEAD)
          COMMITTER_DATE=$(git log -1 --pretty=format:'%cI' HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%B' HEAD)

          NEW_COMMIT=$(GIT_AUTHOR_NAME="$AUTHOR_NAME" \
              GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL" \
              GIT_AUTHOR_DATE="$AUTHOR_DATE" \
              GIT_COMMITTER_NAME="$COMMITTER_NAME" \
              GIT_COMMITTER_EMAIL="$COMMITTER_EMAIL" \
              GIT_COMMITTER_DATE="$COMMITTER_DATE" \
              git commit-tree $TREE -m "$COMMIT_MSG")

          git branch avium-16.2-beta $NEW_COMMIT
          git checkout avium-16.2-beta

          git for-each-ref --format='%(refname)' refs/remotes refs/heads | \
              grep -v 'refs/heads/avium-16.2-beta' | xargs -r -n1 git update-ref -d

          git remote add target https://cnb:${{ secrets.CNB_TOKEN }}@cnb.cool/MZWNET/AviumUI/android_frameworks_base.git
          git push target avium-16.2-beta:avium-16.2-beta
          git lfs push target avium-16.2-beta

          git tag avium-16.2-beta
          git push target --tags
